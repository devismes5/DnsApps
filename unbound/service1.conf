#
# UNBOUND - FORWARDING MODE - DNS Over TLS
#
# See
#   https://www.privateproxyguide.com/using-unbound-as-a-secure-local-dns-resolver-for-vpns/
#
server:
    username: "unbound"
    directory: "C:\Users\Bruno\LocalDnsApps\unbound"


    # log level: 0 is least verbose. 1 is default.
    # log levels can be found at https://docs.pi-hole.net/guides/dns/unbound/
    verbosity: 3
    #interface: 127.0.0.1
    #interface: 80.128.97.108
    #interface: 0.0.0.0
    #interface: ::0

    # port to answer queries from; 53 by default
    #port: 53

# Privacy & hardening 
qname-minimisation: yes 



# Performance
 num-threads: 2 cache-min-ttl: 60 cache-max-ttl: 86400 rrset-cache-size: 256m msg-cache-size: 128m 
# Use system trust for TLS (needed if you enable DoT forwarding) tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt" 
    # Allow queries from the local host
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    allow access-control: ::1 allow 
    #access-control: 192.168.1.0/16 allow

    #access-control: 127.0.0.1 allow
    access-control: 192.168.0.0/24 allow
    access-control: 192.168.1.0/24 allow
    access-control: 192.168.2.0/24 allow

    # The log file "" means log to stderr
    # Use of this option sets use-syslog to "no".
    # logfile: "/var/log/unbound/unbound.log"
    log-queries: no # default

    # Print statistics to the log (for every thread) every N seconds.
    # Set to "" or 0 to disable. Default is disabled.
    # statistics-interval: 5

    do-ip4: yes
    do-ip6: no
    prefer-ip6: no
    do-udp: yes
    do-tcp: yes

 
    # DNSSEC validation (root trust anchor auto-managed) 
    # Trust anchors and root servers
    root-hints: "root.hints"
    auto-trust-anchor-file: "root.key"

    # Privacy
    hide-version: yes
    identity: "Unbound server"
    hide-identity: yes

    #------

    # Disable Unbound's own DNSSEC validation
    # Commented out by brusam on 30-5-2026 in order turn on DNSSEC validation
    ## val-permissive-mode: yes
    ## module-config: "iterator"

    val-permissive-mode: no          # Strict validation (recommended)

    # Basic hardening
    harden-glue: yes
    harden-dnssec-stripped: yes      # Treat missing DNSSEC on signed zones as BOGUS
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes
    harden-referral-path: yes
    #harden-short-bufsize: yes

    # Additional hardening
    use-caps-for-id: yes             # 0x20-bit encoding for extra spoof protection

    # Already recommended from cache optimization
    #aggressive-nsec: yes
    #------

    # EDNS & Buffer size (reduce fragmentation issues)
    edns-buffer-size: 1232
    max-udp-size: 1232

    # Advanced Cache & Performance

    # Prefetch to reduce future latency
    # Proactive refresh
    prefetch: yes    #  Refreshes popular domain records before they expire. Default: on
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 1800
    serve-expired-client-timeout: 1800

    qname-minimisation: yes      # Privacy improvement
    aggressive-nsec: yes         # Better negative caching with NSEC/NSEC3

    unwanted-reply-threshold: 999

    #######################
    # Caching performance #
    #######################

    # Cache Size Optimization
    msg-cache-size: 64m          # Cache hit rate. Default 128m
    rrset-cache-size: 128m       # Cache hit rate. Default 256m
    key-cache-size: 16m          # Default 4m
    #msg-cache-size: 100m
    #rrset-cache-size: 200m
    #key-cache-size: 64m

    # TTL Control
    cache-min-ttl: 300           # Lower cold-query rate 5 minutes (prevents very short TTLs from thrashing cache)
    cache-max-ttl: 86400         # 24 hours (default is 86400)
    cache-max-negative-ttl: 3600 # 1 hour for NXDOMAIN / SERVFAIL caching

    #--- insert start



    # Memory & Thread Tuning
    num-threads: 4               # Adjust to your CPU cores (2-8 is common)
    outgoing-range: 950          # Increase concurrent outgoing queries
    #infra-cache-slabs: 8
    #msg-cache-slabs: 8
    #rrset-cache-slabs: 8
    #key-cache-slabs: 8

    # Slabs
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # Optional: Larger infra cache for client IP tracking
    infra-cache-size: 16m
    #--- end

    # Threading - only use 2 cores
    num-threads: 2
    num-queries-per-thread: 225
    outgoing-range: 452
    outgoing-num-tcp: 40
    incoming-num-tcp: 60
    tcp-idle-timeout: 600
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # Use this only if you're running multiple Unbound instances (Linux)
    # so-reuseport: no

    # Performance features
    rrset-roundrobin: yes
    minimal-responses: yes

    # Prevent DNS leaks via private address space
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
    private-address: 192.0.2.0/24
    private-address: 198.51.100.0/24
    private-address: 203.0.113.0/24
    private-address: 255.255.255.255/32
    private-address: 2001:db8::/32

	# on Windows, this setting adds the certificates from the Windows
	# Cert Store.  For when you want to use forwarders with TLS.
	tls-win-cert: yes

    # Required CA bundle for TLS
    tls-cert-bundle: "ca-bundle.crt"

    # ==================== Forwarding to dnscrypt-proxy ====================
    # Allow forwarding to localhost
    do-not-query-localhost: no

# do not forward Unbound upstream; use dnscrypt‑proxy separately if the goal is encrypted forwarding to a third‑party resolver
forward-zone:
    # Make Unbound act as a forwarder for everything
    name: "."
    forward-tls-upstream: yes		# use DNS-over-TLS forwarder
	#forward-first: no			# do NOT send direct
    # Disable forward-tls-upstream — dnscrypt-proxy handles encryption
    forward-addr: 127.0.0.1@5353
    forward-addr: ::1@5353
    #forward-addr: 9.9.9.9
    #forward-addr: 1.1.1.1

    # Cloudflare DNS servers with DNS-over-TLS
    # forward-addr: 1.1.1.1@853#cloudflare-dns.com
    # forward-addr: 1.0.0.1@853#cloudflare-dns.com
    # forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
    # forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com
