# ====================== Unbound Configuration ======================
#
# FORWARDING MODE - DNS Over TLS
#
# See
#   https://www.privateproxyguide.com/using-unbound-as-a-secure-local-dns-resolver-for-vpns/
#   https://unbound.docs.nlnetlabs.nl/en/latest/topics/privacy/dns-over-https.html
#
# Optimized for forwarding to dnscrypt-proxy on 5353 + DNSSEC
#      System DNS (127.0.0.1:53) 
#   -> Unbound (DNS Cache + DNSSEC Validation) 
#   -> dnscrypt-proxy (port 5353) 
#   -> Encrypted DNS (DNSCrypt/DoH)
#
# Windows System DNS → 127.0.0.1:53 (Unbound) → 127.0.0.1:5353 (dnscrypt-proxy) → Encrypted DNS


server:

    # ==================== Logging ====================
    #
    # The log file "" means log to stderr
    # Use of this option sets use-syslog to "no".
    # To start the service with a new log
    # unbound-control -c service.conf flush_zone . && net stop unbound && > "unbound.log" echo. && net start unbound
    logfile: "unbound.log"
    # log levels can be found at https://docs.pi-hole.net/guides/dns/unbound/
    verbosity: 0   # Temporary log level: 0 is least verbose. 1 is default.
    log-queries: no
    #use-syslog: no
    # Print statistics to the log (for every thread) every N seconds.
    # Set to "" or 0 to disable. Default is disabled.
    # statistics-interval: 5

    # ==================== Basic Settings ====================unbound-control log_ident
    # 
    #username:                         # Not supported on Windows
    directory: "C:\\AppDevProjects\\DnsApps\\unbound"
    #chroot:                           # Not supported on Windows
    #pidfile:                          # Not supported on Windows

    # Listen only on localhost (secure)
    interface: 127.0.0.1
    interface: ::1
    port: 53

    # Access control
    access-control: 127.0.0.0/8 allow
    access-control: ::1 allow
    access-control: 192.168.0.0/16 allow

    do-ip4: yes
    do-ip6: yes
    prefer-ip6: no
    do-udp: yes
    do-tcp: yes
	
	# prevent outgoing connections to IPv4 and/or IPv6
    ##do-not-query-address: 0.0.0.0/0
    ##do-not-query-address: ::/0
	

    # ==================== Forwarding to dnscrypt-proxy ====================
    do-not-query-localhost: no

    # ==================== Cache Optimization ====================
    msg-cache-size: 72m              # Cache hit rate. Default 128m
    rrset-cache-size: 128m           # RRset cache hit rate. Default 4m
    key-cache-size: 32m              # Default 4m


    cache-max-ttl: 86400             # 24 hours (default is 86400)
    cache-min-ttl: 300               # Lower cold-query rate 5 minutes (prevents very short TTLs from thrashing cache)
    cache-max-negative-ttl: 3600     # 1 hour for NXDOMAIN / SERVFAIL caching

    # Prefetch to reduce future latency
    prefetch: yes                    # Proactive refresh of popular domain records before they expire. Default: on
    prefetch-key: yes
    aggressive-nsec: yes             # Better negative caching with NSEC/NSEC3

    # Adjust to your CPU cores (2-8 is common)
    # Set threading to half the number of physical cores + 1
    # wmic cpu get NumberOfCores,NumberOfLogicalProcessors
    # NumberOfCores  NumberOfLogicalProcessors
    # 10             12
    num-threads: 6                   # Safe for most Windows machines: 2
    outgoing-range: 950              # Increase concurrent outgoing queries

    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    key-cache-slabs: 4

    # ==================== DNSSEC Validation ====================
	# Information on root name servers needed to initialize cache of Internet domain name servers
	# wget https://www.internic.net/domain/named.root -qO- | sudo tee [/var/lib/unbound/]root.hints
    root-hints: "root.hints"
	# Enable DNSSEC
    auto-trust-anchor-file: "root.key"

    val-permissive-mode: no          # Strict validation (recommended)

    harden-glue: yes
    harden-dnssec-stripped: yes      # Treat missing DNSSEC on signed zones as BOGUS
    harden-below-nxdomain: yes
    harden-algo-downgrade: yes
    harden-referral-path: yes

    # ==================== Security & Privacy ====================
    qname-minimisation: yes           # Privacy improvement
    use-caps-for-id: yes              # 0x20-bit encoding for extra spoof protection
    hide-identity: yes
    hide-version: yes

    unwanted-reply-threshold: 999

    # Windows-specific
    tls-win-cert: yes

forward-zone:
    name: "."
    forward-addr: 127.0.0.1@5353
    forward-addr: ::1@5353

remote-control:
	# If you want to use unbound-control.exe from the command line, use
	
	control-enable: yes
	control-interface: 127.0.0.1
	control-interface: ::1
	control-use-cert: no
