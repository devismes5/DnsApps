#
# UNBOUND - RECURSIVE MODE + DNSSEC ENABLE
#
server:

    # Basic setup
    verbosity: 1
    interface: 127.0.0.1
    port: 53
    access-control: 127.0.0.0/8 allow
    access-control: 192.168.1.0/16 allow

    do-ip4: yes
    do-ip6: yes
    prefer-ip6: no
    do-udp: yes
    do-tcp: yes

    # Enable DNSSEC validation (disable val-permissive-mode)
    val-permissive-mode: no
    module-config: "validator iterator"

	directory: "C:\Users\Bruno\LocalDnsApps\unbound"

    # Trust anchors and root servers
    root-hints: "root.hints"
    auto-trust-anchor-file: "root.key"

    # Security & Privacy
    hide-version: yes
    identity: ""
    hide-identity: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    harden-short-bufsize: yes

    # EDNS & Buffer size (reduce fragmentation issues)
    edns-buffer-size: 1232
    max-udp-size: 1232

    # Prefetch to reduce future latency
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 1800
    serve-expired-client-timeout: 1800

    # Caching performance
    msg-cache-size: 100m
    rrset-cache-size: 200m
    key-cache-size: 64m
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # Threading - use max 2 cores
    num-threads: 2
    num-queries-per-thread: 225
    outgoing-range: 450
    outgoing-num-tcp: 40
    incoming-num-tcp: 60
    tcp-idle-timeout: 600
    so-rcvbuf: 4m
    so-sndbuf: 4m

    # Performance features
    rrset-roundrobin: yes
    minimal-responses: yes
    qname-minimisation: yes

    # Prevent DNS leaks via private address space
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10
    private-address: 192.0.2.0/24
    private-address: 198.51.100.0/24
    private-address: 203.0.113.0/24
    private-address: 255.255.255.255/32
    private-address: 2001:db8::/32

    # Required CA bundle for TLS (still safe to include, even if not forwarding)
    tls-cert-bundle: "ca-bundle.crt"

remote-control:
	# If you want to use unbound-control.exe from the command line, use
	control-enable: yes
	control-interface: 127.0.0.1
	control-use-cert: no